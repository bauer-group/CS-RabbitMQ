## =============================================================================
## BAUER GROUP RabbitMQ - Static Base Configuration
## =============================================================================
## Structural settings that do not change between deployments or sizing tiers.
## Tier-specific and env-driven knobs live in 90-tuning.conf (rendered at boot
## by docker-entrypoint-custom.sh from 90-tuning.conf.template).
##
## Loaded AFTER the official image's generated 10-defaults.conf, so the
## bootstrap admin (default_user/default_pass/default_vhost from env) is kept.
## Comments use '#'/'##'; inline comments after a value are NOT supported.
## =============================================================================

## ----------------------------------------------------------------------------
## Networking — listeners
## ----------------------------------------------------------------------------
# AMQP 0-9-1 / AMQP 1.0 (plaintext)
listeners.tcp.default = 5672
# AMQP over TLS (AMQPS)
listeners.ssl.default = 5671

## ----------------------------------------------------------------------------
## TLS — certificate file paths
## ----------------------------------------------------------------------------
# Files are provisioned by the entrypoint depending on RABBITMQ_TLS_MODE:
#   selfsigned (default) — generated in-place on first boot
#   managed              — written by the traefik-certs-dumper sidecar
#   byo                  — bind-mounted by the operator
# The entrypoint guarantees ca.pem exists (self-signed certs are their own CA).
ssl_options.cacertfile = /etc/rabbitmq/certs/ca.pem
ssl_options.certfile   = /etc/rabbitmq/certs/cert.pem
ssl_options.keyfile    = /etc/rabbitmq/certs/key.pem
ssl_options.depth      = 5

## ----------------------------------------------------------------------------
## Management UI / HTTP API (rabbitmq_management plugin)
## ----------------------------------------------------------------------------
management.tcp.port = 15672

## ----------------------------------------------------------------------------
## Prometheus metrics (rabbitmq_prometheus plugin) — listens on 15692
## ----------------------------------------------------------------------------
# Per-object metrics are expensive to scrape on brokers with many queues;
# keep them off by default and enable only when you need per-queue series.
prometheus.return_per_object_metrics = false

## ----------------------------------------------------------------------------
## TCP socket options (performance)
## ----------------------------------------------------------------------------
tcp_listen_options.keepalive = true
tcp_listen_options.backlog   = 1024
tcp_listen_options.nodelay   = true

## ----------------------------------------------------------------------------
## Security
## ----------------------------------------------------------------------------
# Because RABBITMQ_DEFAULT_USER is set, the insecure 'guest' account is never
# created. This line is a defense-in-depth guard: should a 'guest' ever exist,
# it stays restricted to loopback connections only.
loopback_users.guest = true
